{% extends "global/folha_rosto.html" %}

{% block title %}Login | {% endblock title %}

{% block cover-page %}
<div class="welcome-card">
    <div class="user-avatar">
        <i class="fas fa-lock"></i>
    </div>
    
    <h1 class="welcome-title">Bem-vindo Login (Coloque a sua marca aqui)</h1>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    
    <form action="{% url "login" %}" method="post"> {% csrf_token %}
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="username" required name="username">
        </div>
        
        <div class="input-group">
            <i class="fas fa-key"></i>
            <input type="password" placeholder="senha" required name="senha">
        </div>
        
        <button type="submit" class="btn-acessar">Entrar</button>
    </form>

</div>
{% endblock cover-page %}
